<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>La Cabaña | Menú Digital</title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="container">

            <img
                src="assets/logo/logo.png"
                alt="Logo Restaurante La Cabaña"
                class="logo"
            >

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main>

        <!-- HERO -->

        <section class="hero">

            <div class="container">

                <h1>LA CABAÑA</h1>

                <p>
                    Comida típica colombiana
                </p>

            </div>

        </section>

        <!-- BUSCADOR -->

        <section class="search">

            <div class="container">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="🔍 Buscar un plato..."
                >

            </div>

        </section>

        <!-- CATEGORÍAS -->

        <section class="categories">

            <div class="container">

                <button class="category-btn">🥟 Entradas</button>

                <button class="category-btn">⭐ Especialidades</button>

                <button class="category-btn">🥩 Res</button>

                <button class="category-btn">🍗 Pollo</button>

                <button class="category-btn">🐟 Pescados</button>

                <button class="category-btn">🐖 Cerdo</button>

                <button class="category-btn">🍲 Sopas</button>

                <button class="category-btn">➕ Adicionales</button>

                <button class="category-btn">🥤 Bebidas</button>

            </div>

        </section>

        <!-- PRODUCTOS -->

        <section class="products">

            <div
                class="container"
                id="productsContainer"
            >

                <!--
                    Aquí JavaScript cargará automáticamente
                    todos los productos desde productos.json
                -->

            </div>

        </section>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="container">

            <p>

                © 2026 Restaurante La Cabaña

            </p>

        </div>

    </footer>

    <!-- JavaScript -->

    <script src="app.js"></script>

</body>

</html>
